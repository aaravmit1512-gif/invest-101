<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossary — Invest 101</title>
<meta name="description" content="Every investing term used on this site, in one quick-reference list.">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<main class="wrap">
  <a class="back-link" href="../index.html">&larr; Back</a>

  <div class="content-card tint-lavender tinted">
    <span class="kicker">Topic 09 &middot; quick reference</span>
    <h1>Glossary</h1>
    <p class="lede">Every term on this site, in one place. Loaded from a single data file
      (<code>data/glossary.json</code>) so adding a term means editing one line.</p>
    <input id="glossary-filter" type="search" placeholder="Type to filter, e.g. SIP"
      aria-label="Filter glossary terms"
      style="width:100%;max-width:420px;border:2.5px solid #111;border-radius:8px;padding:10px 12px;font:inherit;font-weight:700;margin-bottom:8px">
  </div>

  <div class="content-card" style="margin-top:26px">
    <dl id="glossary-list" aria-live="polite"><!-- filled by script below --></dl>
  </div>

</main>
<script src="../js/components.js" data-root=".."></script>
<script type="module">
  /* Data-driven glossary: fetch the JSON, render terms, filter as you type. */
  const list = document.getElementById("glossary-list");
  const filter = document.getElementById("glossary-filter");
  let terms = [];

  function render(q) {
    const needle = (q || "").trim().toLowerCase();
    const shown = terms.filter(t =>
      !needle ||
      t.term.toLowerCase().includes(needle) ||
      t.def.toLowerCase().includes(needle)
    );
    list.innerHTML = shown.length
      ? shown.map(t =>
          '<div class="term"><dt>' + t.term + "</dt><dd>" + t.def + "</dd></div>"
        ).join("")
      : "<p>No matching term. Try a shorter search.</p>";
  }

  try {
    const res = await fetch("../data/glossary.json");
    terms = (await res.json()).terms;
    terms.sort((a, b) => a.term.localeCompare(b.term));
    render("");
    filter.addEventListener("input", () => render(filter.value));
  } catch (e) {
    list.innerHTML = "<p>Couldn&rsquo;t load the glossary data. If you opened this file " +
      "directly from disk, serve the folder instead: <code>python3 -m http.server</code></p>";
  }
</script>
</body>
</html>
